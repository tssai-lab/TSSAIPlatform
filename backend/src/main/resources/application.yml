server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8
    use-relative-redirects: true

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

# MinIO（与 Docker 容器 minio-tss 一致，数据持久化到仓库根目录 tss_minio_data）
minio:
  endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9010}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:models}

point-cloud:
  preview:
    max-size: ${POINT_CLOUD_PREVIEW_MAX_SIZE:209715200}

dataset:
  preview:
    max-zip-entries: ${DATASET_PREVIEW_MAX_ZIP_ENTRIES:10000}
    max-text-bytes: ${DATASET_PREVIEW_MAX_TEXT_BYTES:1048576}
    max-image-bytes: ${DATASET_PREVIEW_MAX_IMAGE_BYTES:20971520}
    max-page-size: ${DATASET_PREVIEW_MAX_PAGE_SIZE:200}

spring:
  application:
    name: tss-backend
  profiles:
    # 默认走 PostgreSQL；本地若想用 H2 可启动时加：--spring.profiles.active=dev
    active: ${SPRING_PROFILES_ACTIVE:default}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    multipart:
      # 这里只限制单个 HTTP multipart 请求大小，不限制数据集总文件大小。
      # 数据集上传走 /api/dataset/upload/* 分片链路，当前单分片为 5MB；
      # 因此 10GB 数据集会被拆成约 2048 个小请求，不受传统 100MB 单次直传上限影响。
      max-file-size: 64MB
      max-request-size: 64MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/tss}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.tss.platform.module1.entity
  configuration:
    map-underscore-to-camel-case: true

# 短信验证码（开发环境未接真实短信网关时，验证码输出到后台日志）
sms:
  expose-code: true

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

training:
  mlflow:
    enabled: ${TRAINING_MLFLOW_ENABLED:true}
    tracking-uri: ${TRAINING_MLFLOW_TRACKING_URI:http://127.0.0.1:5000}
    experiment-name: ${TRAINING_MLFLOW_EXPERIMENT_NAME:tss-training}
  kubernetes:
    enabled: ${TRAINING_K8S_ENABLED:true}
    auto-create: ${TRAINING_K8S_AUTO_CREATE:true}
    verify-on-startup: ${TRAINING_K8S_VERIFY_ON_STARTUP:true}
    fallback-to-local: ${TRAINING_K8S_FALLBACK_TO_LOCAL:true}
    cluster-name: ${TRAINING_K8S_CLUSTER_NAME:tss-training}
    namespace: ${TRAINING_K8S_NAMESPACE:tss-training}
    service-account: ${TRAINING_K8S_SERVICE_ACCOUNT:tss-training-worker}
    project-root: ${TRAINING_K8S_PROJECT_ROOT:..}
    kubeconfig: ${TRAINING_K8S_KUBECONFIG:k8s/.kube/config}
    kind-path: ${TRAINING_K8S_KIND_PATH:.tools/bin/kind}
    kubectl-path: ${TRAINING_K8S_KUBECTL_PATH:.tools/bin/kubectl}
    bootstrap-script: ${TRAINING_K8S_BOOTSTRAP_SCRIPT:backend/scripts/k8s/bootstrap-local-kind.sh}
    verify-script: ${TRAINING_K8S_VERIFY_SCRIPT:backend/scripts/k8s/verify-local-kind.sh}
    worker-image: ${TRAINING_K8S_WORKER_IMAGE:tss-training-worker:local}
    worker-image-pull-policy: ${TRAINING_K8S_WORKER_IMAGE_PULL_POLICY:IfNotPresent}
    backend-service-url: ${TRAINING_K8S_BACKEND_SERVICE_URL:http://tss-backend:8080}
    minio-service-url: ${TRAINING_K8S_MINIO_SERVICE_URL:http://tss-minio:9000}
    mlflow-service-url: ${TRAINING_K8S_MLFLOW_SERVICE_URL:http://tss-mlflow:5000}
    mlflow-experiment-name: ${TRAINING_K8S_MLFLOW_EXPERIMENT_NAME:TSSAI-K8s-Training}
    cpu-request: ${TRAINING_K8S_CPU_REQUEST:500m}
    cpu-limit: ${TRAINING_K8S_CPU_LIMIT:2}
    memory-request: ${TRAINING_K8S_MEMORY_REQUEST:512Mi}
    memory-limit: ${TRAINING_K8S_MEMORY_LIMIT:4Gi}
    job-active-deadline-seconds: ${TRAINING_K8S_JOB_ACTIVE_DEADLINE_SECONDS:3600}
    job-ttl-seconds-after-finished: ${TRAINING_K8S_JOB_TTL_SECONDS:3600}
    internal-callback-token: ${TRAINING_K8S_INTERNAL_CALLBACK_TOKEN:}
    monitor-interval-ms: ${TRAINING_K8S_MONITOR_INTERVAL_MS:30000}
    bootstrap-timeout-seconds: ${TRAINING_K8S_BOOTSTRAP_TIMEOUT_SECONDS:600}
