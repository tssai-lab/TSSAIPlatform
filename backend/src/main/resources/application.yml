server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8
    use-relative-redirects: true

# MinIO（与 Docker 容器 minio-tss 一致，数据持久化到仓库根目录 tss_minio_data）
minio:
  endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9010}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:models}

point-cloud:
  preview:
    max-size: ${POINT_CLOUD_PREVIEW_MAX_SIZE:209715200}

dataset:
  preview:
    max-zip-entries: ${DATASET_PREVIEW_MAX_ZIP_ENTRIES:10000}
    max-text-bytes: ${DATASET_PREVIEW_MAX_TEXT_BYTES:1048576}
    max-image-bytes: ${DATASET_PREVIEW_MAX_IMAGE_BYTES:20971520}
    max-page-size: ${DATASET_PREVIEW_MAX_PAGE_SIZE:200}

spring:
  application:
    name: tss-backend
  profiles:
    # 默认走 PostgreSQL；本地若想用 H2 可启动时加：--spring.profiles.active=dev
    active: ${SPRING_PROFILES_ACTIVE:default}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    multipart:
      # 这里只限制单个 HTTP multipart 请求大小，不限制数据集总文件大小。
      # 数据集上传走 /api/dataset/upload/* 分片链路，当前单分片为 5MB；
      # 因此 10GB 数据集会被拆成约 2048 个小请求，不受传统 100MB 单次直传上限影响。
      max-file-size: 64MB
      max-request-size: 64MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/tss}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.tss.platform.module1.entity
  configuration:
    map-underscore-to-camel-case: true

# 短信验证码（开发环境未接真实短信网关时，验证码输出到后台日志）
sms:
  expose-code: true

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

training:
  mlflow:
    enabled: ${TRAINING_MLFLOW_ENABLED:true}
    tracking-uri: ${TRAINING_MLFLOW_TRACKING_URI:http://127.0.0.1:5000}
    experiment-name: ${TRAINING_MLFLOW_EXPERIMENT_NAME:tss-training}
