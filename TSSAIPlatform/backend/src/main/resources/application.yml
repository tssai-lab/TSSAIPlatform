server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8
    use-relative-redirects: true

# MinIO（与 Docker 容器 minio-tss 一致，数据持久化到仓库根目录 tss_minio_data）
minio:
  endpoint: http://127.0.0.1:9010
  access-key: admin
  secret-key: password123
  bucket: models

spring:
  application:
    name: tss-backend
  profiles:
    # 默认走 PostgreSQL；本地若想用 H2 可启动时加：--spring.profiles.active=dev
    active: ${SPRING_PROFILES_ACTIVE:default}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/tss}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
        format_sql: true
