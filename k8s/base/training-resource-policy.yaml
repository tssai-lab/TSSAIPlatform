apiVersion: v1
kind: ResourceQuota
metadata:
  name: tss-training-quota
  namespace: tss-training
spec:
  hard:
    requests.cpu: "3"
    requests.memory: 8Gi
    limits.cpu: "4"
    limits.memory: 12Gi
    pods: "10"
    count/jobs.batch: "50"
    count/secrets: "20"
    count/configmaps: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: tss-training-default-limits
  namespace: tss-training
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 500m
        memory: 512Mi
        ephemeral-storage: 1Gi
      default:
        cpu: "2"
        memory: 4Gi
        ephemeral-storage: 4Gi
      min:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 8Gi
        ephemeral-storage: 16Gi
